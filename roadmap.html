  .tabs{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
  .tab-btn{padding:4px 12px;font-size:9px;border-radius:3px;border:1px solid #0e2540;letter-spacing:2px;text-transform:uppercase;color:#475569;transition:all .2s}
  .tab-btn.active{background:#38bdf8;color:#02080f;border-color:#38bdf8}

  /* PROGRESS BAR */
  .bar-wrap{margin-top:4px}
  .bar-meta{display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:2px}
  .bar-track{height:3px;background:#0f172a;border-radius:2px;overflow:hidden}
  .bar-fill{height:100%;border-radius:2px;transition:width .3s ease}

  /* MAIN */
  #main{max-width:860px;margin:0 auto;padding:16px 14px 80px}

  /* CARDS */
  .card{border-radius:8px;margin-bottom:12px;overflow:hidden}
  .card-header{width:100%;padding:14px 16px;text-align:left;display:flex;align-items:center;justify-content:space-between;background:none;border:none}
  .card-header:hover{opacity:.85}
  .chevron{font-size:12px;transition:transform .2s}
  .card-body{padding:0 12px 14px}

  /* STAGE */
  .stage-code{font-size:18px;font-weight:800}
  .stage-meta{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#334155}
  .stage-title{font-size:14px;font-weight:700;color:#f1f5f9;margin:2px 0}
  .stage-cert{font-size:10px;color:#475569}

  /* MONTH */
  .month-card{background:#020a14;border:1px solid #0e2540;border-radius:6px;margin-bottom:8px}
  .month-title{font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:2px}
  .month-note{font-size:10px;color:#475569;font-style:italic;margin-bottom:4px}

  /* WEEK */
  .week-card{background:#010710;border:1px solid #0a1828;border-radius:5px;margin-bottom:6px}
  .week-title{font-size:11px;font-weight:600;color:#cbd5e1;margin-bottom:4px}

  .day-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #070e1a}
  .day-row:last-child{border-bottom:none}
  .day-row input[type=checkbox]{margin-top:3px;flex-shrink:0;accent-color:#38bdf8;width:14px;height:14px}
  .day-info{flex:1}
  .day-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:3px}
  .day-label{font-size:10px;font-weight:700;color:#64748b}
  .day-time{font-size:9px;color:#334155}
  .res-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700}
  .day-task{font-size:12px;color:#94a3b8;line-height:1.5}
  .day-row.done .day-label,.day-row.done .day-task{color:#1e3a5f;text-decoration:line-through}

  /* MILESTONES */
  .ms-block{background:#010509;border-radius:5px;padding:12px;margin-top:4px}
  .ms-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .ms-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
  .ms-row input[type=checkbox]{margin-top:2px;flex-shrink:0;width:14px;height:14px}
  .ms-text{font-size:12px;color:#94a3b8;line-height:1.4}
  .ms-row.done .ms-text{color:#1e3a5f;text-decoration:line-through}

  .ov-card{background:#030d1a;border-radius:8px;padding:14px}
  .ov-code{font-size:18px;font-weight:800;margin-bottom:2px}
  .ov-title{font-size:11px;color:#94a3b8;margin-bottom:1px}
  .ov-target{font-size:9px;color:#334155;margin-bottom:8px}

  /* TIMELINE */
  .timeline-card{background:#030d1a;border:1px solid #0e2540;border-radius:8px;padding:16px;margin-bottom:12px}
  .section-label{font-size:9px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
  .tl-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #0a1828}
  .tl-bar{width:3px;height:24px;border-radius:2px;flex-shrink:0}
  .tl-name{flex:1;font-size:12px;color:#94a3b8}
  .tl-date{font-size:11px;font-weight:700}

  /* COACHING */
  .coaching-card{background:#030d1a;border:1px solid #0e2540;border-radius:8px;padding:20px;margin-bottom:12px}
  .coaching-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #0a1828}
  .coaching-num{font-size:12px;color:#38bdf8;font-weight:700;flex-shrink:0;margin-top:1px}
  .coaching-text{font-size:13px;color:#94a3b8;line-height:1.6}
  .why-block{margin-top:20px;padding:14px;background:#020a14;border-radius:6px}
  .why-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .why-text{font-size:12px;color:#64748b;line-height:1.7}

  .setup-text{font-size:12px;color:#94a3b8;line-height:1.5}
  .setup-item.done .setup-text{color:#334155;text-decoration:line-through}
</style>

// ── STATE ─────────────────────────────────────────────────────────────────────
const LS_KEY = "emre_roadmap_v2";
let state = {checked:{}, milestones:{}, open:{stage:"s0",month:"m1",week:"w1"}, tab:"roadmap"};

function loadState(){
  try{const s=localStorage.getItem(LS_KEY);if(s)state=Object.assign(state,JSON.parse(s));}catch(e){}
}
function saveState(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify(state));
    const el=document.getElementById("save-status");
    el.classList.add("show");
    setTimeout(()=>el.classList.remove("show"),1800);
  }catch(e){}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toggleCheck(id,isMilestone){
  if(isMilestone) state.milestones[id]=!state.milestones[id];
  else state.checked[id]=!state.checked[id];
  saveState();
  renderAll();
}

function allTaskIds(){
  const ids=[];
  SETUP.forEach(x=>ids.push(x.id));
  STAGES.forEach(s=>s.months.forEach(m=>m.weeks.forEach(w=>w.days.forEach(d=>ids.push(d.id)))));
  return ids;
}

function stageStats(stage){
  let t=0,d=0;
  stage.months.forEach(m=>m.weeks.forEach(w=>w.days.forEach(x=>{t++;if(state.checked[x.id])d++;})));
  return{t,d};
}
function monthStats(month){
  let t=0,d=0;
  month.weeks.forEach(w=>w.days.forEach(x=>{t++;if(state.checked[x.id])d++;}));
  return{t,d};
}
function weekStats(week){
  return{t:week.days.length,d:week.days.filter(x=>state.checked[x.id]).length};
}

function barHTML(t,d,color){
  const p=t===0?0:Math.round((d/t)*100);
  return `<div class="bar-wrap"><div class="bar-meta"><span>${d}/${t}</span><span>${p}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div></div>`;
}

function toggle(type,id){
  if(type==="stage") state.open.stage=state.open.stage===id?null:id;
  if(type==="month") state.open.month=state.open.month===id?null:id;
  if(type==="week") state.open.week=state.open.week===id?null:id;
  saveState();
  renderAll();
}

function switchTab(t){
  state.tab=t;
  saveState();
  renderAll();
}
window.switchTab=switchTab;
window.toggle=toggle;
window.toggleCheck=toggleCheck;

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){
  renderHeader();
  renderTabs();
  if(state.tab==="roadmap") renderRoadmap();
  else if(state.tab==="overview") renderOverview();
  else renderCoaching();
  ["roadmap","overview","coaching"].forEach(t=>{
    document.getElementById("tab-"+t).style.display=state.tab===t?"block":"none";
  });
}

function renderHeader(){
  const ids=allTaskIds();
  const t=ids.length, d=ids.filter(id=>state.checked[id]).length;
  const p=t===0?0:Math.round((d/t)*100);
  document.getElementById("total-done-label").textContent=`${d}/${t} tasks`;
  document.getElementById("total-pct-label").textContent=`${p}%`;
  document.getElementById("total-bar").style.width=p+"%";
}

function renderTabs(){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active",b.textContent.toLowerCase()===state.tab);
  });
}

function renderRoadmap(){
  const el=document.getElementById("tab-roadmap");
  let html="";

  // Setup card
  const suDone=SETUP.filter(x=>state.checked[x.id]).length;
  const suOpen=state.open.stage==="setup";
  html+=`<div class="card" style="background:#030d1a;border:1px solid #38bdf822">
    <button class="card-header" onclick="toggle('stage','setup')">
      <div style="flex:1;margin-right:12px">
        <div style="font-size:9px;color:#38bdf8;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Before Week 1</div>
        <div style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:6px">One-Time Setup Checklist</div>
        ${barHTML(SETUP.length,suDone,"#38bdf8")}
      </div>
      <span class="chevron" style="color:#38bdf8">${suOpen?"▲":"▼"}</span>
    </button>`;
  if(suOpen){
    html+=`<div class="card-body">`;
    SETUP.forEach(item=>{
      const done=!!state.checked[item.id];
      html+=`<div class="setup-item${done?" done":""}">
        <input type="checkbox" ${done?"checked":""} onchange="toggleCheck('${item.id}',false)">
        <span class="setup-text">${item.text}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;

  // Stages
  STAGES.forEach(stage=>{
    const {t,d}=stageStats(stage);
    const isOpen=state.open.stage===stage.id;
    html+=`<div class="card" style="background:#030d1a;border:1px solid ${stage.accent}22">
      <button class="card-header" onclick="toggle('stage','${stage.id}')">
        <div style="flex:1;margin-right:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <span class="stage-code" style="color:${stage.accent}">${stage.code}</span>
            <span class="stage-meta">${stage.duration} · ${stage.target}</span>
          </div>
          <div class="stage-title">${stage.title}</div>
          <div class="stage-cert">${stage.cert}</div>
          ${barHTML(t,d,stage.accent)}
        </div>
        <span class="chevron" style="color:${stage.accent}">${isOpen?"▲":"▼"}</span>
      </button>`;

    if(isOpen){
      html+=`<div class="card-body">`;
      stage.months.forEach(month=>{
        const {t:mt,d:md}=monthStats(month);
        const mOpen=state.open.month===month.id;
        html+=`<div class="month-card">
          <button class="card-header" style="padding:12px 14px" onclick="toggle('month','${month.id}')">
            <div style="flex:1;margin-right:8px">
              <div class="month-title">${month.title}</div>
              ${month.note?`<div class="month-note">${month.note}</div>`:""}
              ${barHTML(mt,md,stage.accent)}
            </div>
            <span class="chevron" style="color:#1e3a5f">${mOpen?"▲":"▼"}</span>
          </button>`;

        if(mOpen){
          html+=`<div style="padding:0 12px 12px">`;
          month.weeks.forEach(week=>{
            const {t:wt,d:wd}=weekStats(week);
            const wOpen=state.open.week===week.id;
            html+=`<div class="week-card">
              <button class="card-header" style="padding:10px 12px" onclick="toggle('week','${week.id}')">
                <div style="flex:1;margin-right:8px">
                  <div class="week-title">${week.title}</div>
                  ${barHTML(wt,wd,stage.accent)}
                </div>
                <span class="chevron" style="color:#1e293b">${wOpen?"▲":"▼"}</span>
              </button>`;

            if(wOpen){
              html+=`<div style="padding:0 10px 10px">`;
              week.days.forEach(day=>{
                const done=!!state.checked[day.id];
                const color=rc(day.res);
                html+=`<div class="day-row${done?" done":""}">
                  <input type="checkbox" ${done?"checked":""} style="accent-color:${stage.accent}" onchange="toggleCheck('${day.id}',false)">
                  <div class="day-info">
                    <div class="day-meta">
                      <span class="day-label">${day.day}</span>
                      <span class="day-time">${day.time}</span>
                      <span class="res-tag" style="background:${color}18;color:${color}">${day.res}</span>
                    </div>
                    <div class="day-task">${day.task}</div>
                  </div>
                </div>`;
              });
              html+=`</div>`;
            }
            html+=`</div>`;
          });

          // Milestones
          html+=`<div class="ms-block" style="border:1px solid ${stage.accent}18">
            <div class="ms-label" style="color:${stage.accent}">Month Milestones</div>`;
          month.milestones.forEach((m,i)=>{
            const mid=`${month.id}_ms_${i}`;
            const done=!!state.milestones[mid];
            html+=`<div class="ms-row${done?" done":""}">
              <input type="checkbox" ${done?"checked":""} style="accent-color:${stage.accent}" onchange="toggleCheck('${mid}',true)">
              <span class="ms-text">${m}</span>
            </div>`;
          });
          html+=`</div></div>`;
        }
        html+=`</div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  el.innerHTML=html;
}

function renderOverview(){
  const el=document.getElementById("tab-overview");
  let html=`<div class="overview-grid">`;
  STAGES.forEach(s=>{
    const{t,d}=stageStats(s);
    html+=`<div class="ov-card" style="border:1px solid ${s.accent}22">
      <div class="ov-code" style="color:${s.accent}">${s.code}</div>
      <div class="ov-title">${s.title}</div>
      <div class="ov-target">${s.target}</div>
      ${barHTML(t,d,s.accent)}
    </div>`;
  });
  html+=`</div><div class="timeline-card">
    <div class="section-label">Full Timeline</div>`;
  TIMELINE.forEach(item=>{
    html+=`<div class="tl-row">
      <div class="tl-bar" style="background:${item.color}"></div>
      <div class="tl-name">${item.label}</div>
      <div class="tl-date" style="color:${item.color}">${item.date}</div>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

function renderCoaching(){
  const el=document.getElementById("tab-coaching");
  let html=`<div class="coaching-card">
    <div class="section-label">Coaching Notes</div>`;
  COACHING_NOTES.forEach((note,i)=>{
    html+=`<div class="coaching-row">
      <div class="coaching-num">${String(i+1).padStart(2,"0")}</div>
      <div class="coaching-text">${note}</div>
    </div>`;
  });
  html+=`<div class="why-block">
    <div class="why-label" style="color:#e879f9">Why no FIU?</div>
    <div class="why-text">The cert stack (Security+, eJPT, BSCP, AWS Security Specialty, OSCP) is respected in offensive security hiring. AI security is so new that a documented portfolio competes directly with academic credentials for the next 3–5 years. Bug bounty income starts earlier. You keep flexibility. The MS remains an option later if enterprise/government roles require it.</div>
  </div></div>`;
  el.innerHTML=html;
}

loadState();
renderAll();
</script>
